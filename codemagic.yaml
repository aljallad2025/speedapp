workflows:
  speed-android-ios:
    name: SPEED Car Rental - Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.speed.carrental"
    scripts:
      - name: Generate platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios --org com.speed .
          fi
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Analyze
        script: |
          flutter analyze || true
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - princealjallad@gmail.com
