workflows:
  speed-android-ios:
    name: SPEED Car Rental - Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.speed.carrental"
    scripts:
      - name: Generate platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios --org com.speed .
          fi
      - name: Ensure INTERNET permission (required for release APK network access)
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
            echo ">>> Added INTERNET permission"
          else
            echo ">>> INTERNET permission already present"
          fi
          cat "$MANIFEST"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Analyze
        script: |
          flutter analyze || true
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - princealjallad@gmail.com