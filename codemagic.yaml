workflows:
  speed-android-ios:
    name: SPEED Car Rental - Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generate platform folders
        script: |
          flutter create --platforms=android --org com.speed .
      - name: Add INTERNET permission and network security
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "INTERNET" "$MANIFEST" || sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"><trust-anchors><certificates src="system"/></trust-anchors></base-config></network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
          grep -q "networkSecurityConfig" "$MANIFEST" || sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
          cat "$MANIFEST"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - princealjallad@gmail.com
