name: speed_car_rental
description: SPEED Car Rental & Sales - Bahrain
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  provider: ^6.1.2

  # UI / UX
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0

  # Utilities
  url_launcher: ^6.2.6
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  flutter_rating_bar: ^4.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
        - asset: assets/fonts/Cairo-Variable.ttf
          weight: 700